<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life stats Tracker</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">
    <h2>Your Life in Numbers</h2>
    <p class="subtitle">(A personalized view of your time, energy, and cosmic journey) </p>

    <div class="date-wrapper">
        <span class="placeholder">Pick your birthday 🎂</span>
        <input type="date" id="birthDate">
    </div>

    <div class="error" id="error"></div>

    <button onclick="calculate()">Calculate</button>
    <button class="clr" onclick="clearData()">Clear</button>

    <div class="result" id="result"></div>

    <button class="secondary" onclick="toggleDarkMode()">🌙 Toggle Dark</button>
</div>

<script src="script.js"></script>
</body>
</html>
